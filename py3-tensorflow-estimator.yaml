package:
  name: py3-ml-metadata
  version: 2.15.0
  epoch: 0
  description: TensorFlow's Visualization Toolkit.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: 14
    memory: 50Gi
  dependencies:
    runtime:
      - python3

environment:
  contents:
    packages:
      - bash
      - bazel-6
      - build-base
      - busybox
      - ca-certificates-bundle
      - openjdk-11
      - patch
      - py3-pip
      - python3-dev
  environment:
    JAVA_HOME: /usr/lib/jvm/java-11-openjdk
    BAZEL_CXXOPTS: -std=c++17:-w

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tensorflow/estimator
      tag: ${{package.version}}
      expected-commit: b5f91f8e4113396f0a5f090d6a52d676271caf48

  - runs: |
      bazel build //tensorflow_estimator/tools/pip_package:build_pip_package
      mkdir -p "${{targets.contextdir}}/usr/bin"
      cp bazel-bin/ "${{targets.contextdir}}/usr/bin"

update:
  enabled: true
  github:
    identifier: tensorflow/tensorboard
    use-tag: true
    strip-prefix: v
