package:
  name: py3-ml-metadata
  version: 2.18.0
  epoch: 0
  description: TensorFlow's Visualization Toolkit.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: 14
    memory: 50Gi
  dependencies:
    runtime:
      - python3

environment:
  contents:
    packages:
      - bash
      - bazel-6
      - build-base
      - busybox
      - ca-certificates-bundle
      - patch
      - py3-setuptools
      - python3-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tensorflow/tensorboard
      tag: ${{package.version}}
      expected-commit: 8c1293477b31a32438a20ada2d2e479267057fdc

  - runs: |
      bazel build tensorboard:tensorboard

subpackages:
  - name: ml-metadata-store-server
    description: ML Metadata remote gRPC server
    pipeline:
      - runs: |
          # Reduce the number of jobs to avoid OOM
          bazel build -c opt --define grpc_no_ares=true --jobs $(($(grep -c ^processor /proc/cpuinfo) / 2)) //ml_metadata/metadata_store:metadata_store_server

          mkdir -p "${{targets.contextdir}}/usr/bin"
          cp bazel-bin/ml_metadata/metadata_store/metadata_store_server "${{targets.contextdir}}/usr/bin"
      - uses: strip

update:
  enabled: true
  github:
    identifier: google/ml-metadata
    use-tag: true
    strip-prefix: v
